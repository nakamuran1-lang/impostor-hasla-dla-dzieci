<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Impostor Kids 3.0</title>
<style>
body{font-family:Arial;max-width:800px;margin:auto;padding:15px;text-align:center}
input,select,button{font-size:18px;padding:10px;margin:4px}
table{margin:auto;border-collapse:collapse}td,th{border:1px solid #ccc;padding:6px}
.hidden{display:none}
</style></head><body>
<h1>🎭 Impostor Kids 3.0</h1>
<div id="setup">
Gracze: <select id="cnt"></select><div id="names"></div>
Kategoria:
<select id="cat"><option>Zwierzęta</option><option>Jedzenie</option><option>Pojazdy</option></select><br>
<button onclick="startGame()">Start</button>
<button onclick="localStorage.clear();location.reload()">🗑 Wyczyść graczy</button>
</div>

<div id="pass" class="hidden"><h2 id="passTxt"></h2><button onclick="showRole()">Pokaż rolę</button></div>
<div id="role" class="hidden"><h2 id="roleTxt"></h2><button onclick="nextP()">Ukryj i przekaż dalej</button></div>

<div id="round" class="hidden">
<h2 id="starter"></h2>
<h3 id="catInfo"></h3>
<div id="timer" style="font-size:50px">03:00</div>
<button onclick="finish()">Koniec i głosowanie</button>
</div>

<div id="vote" class="hidden"><h2>Głosowanie</h2><div id="vb"></div></div>

<div id="result" class="hidden">
<h2 id="res"></h2>
<div id="score"></div>
<button onclick="nextRound()">🔄 Następna runda</button>
</div>

<script>
const cats={
"Zwierzęta":["pies","kot","lew","tygrys","żyrafa","zebra"],
"Jedzenie":["pizza","lody","frytki","makaron","banan","hamburger"],
"Pojazdy":["auto","rower","pociąg","rakieta","autobus","samolot"]
};
let names=[],scores={},roles=[],impName="",word="",cur=0,tInt;

for(let i=3;i<=9;i++) cnt.innerHTML+=`<option>${i}</option>`;

function renderNames(){
 let n=+cnt.value,d='';
 for(let i=0;i<n;i++){
 let v=localStorage.getItem('p'+i)||'';
 d+=`<input id=n${i} value="${v}" placeholder="Imię ${i+1}"><br>`;
 }
 names.innerHTML=d;
}
cnt.onchange=renderNames; cnt.value=localStorage.getItem('cnt')||4; renderNames();

function saveNames(){
 localStorage.setItem('cnt',cnt.value);
 for(let i=0;i<+cnt.value;i++) localStorage.setItem('p'+i,document.getElementById('n'+i).value);
}

function startGame(){
 saveNames();
 names=[]; cur=0;
 for(let i=0;i<+cnt.value;i++){
   let n=document.getElementById('n'+i).value||('Gracz '+(i+1));
   names.push(n);
   if(scores[n]==null) scores[n]=0;
 }
 let c=cat.value;
 word=cats[c][Math.floor(Math.random()*cats[c].length)];
 let imp=Math.floor(Math.random()*names.length);
 impName=names[imp];
 roles=names.map((n,i)=>i===imp?'IMPOSTOR':word);
 setup.classList.add('hidden'); pass.classList.remove('hidden');
 passTxt.innerText='📱 Przekaż telefon: '+names[0];
}

function showRole(){
 role.classList.remove('hidden');
 roleTxt.innerHTML=(roles[cur]=='IMPOSTOR')
 ? '🕵️ Tajna misja!<br>Kategoria: '+cat.value
 : '📚 '+cat.value+'<br>Hasło: '+roles[cur];
}

function nextP(){
 role.classList.add('hidden'); cur++;
 if(cur>=names.length){
   pass.classList.add('hidden'); round.classList.remove('hidden');
   catInfo.innerText='Kategoria: '+cat.value;
   starter.innerText='🎲 Zaczyna: '+names[Math.floor(Math.random()*names.length)];
   let t=180; timer.innerText='03:00';
   tInt=setInterval(()=>{t--; timer.innerText=String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0'); if(t<=0) finish();},1000);
 } else passTxt.innerText='📱 Przekaż telefon: '+names[cur];
}

function finish(){
 clearInterval(tInt);
 round.classList.add('hidden'); vote.classList.remove('hidden');
 vb.innerHTML='';
 names.forEach(n=> vb.innerHTML += `<button onclick="resultRound('${n}')">${n}</button><br>`);
}

function resultRound(voted){
 vote.classList.add('hidden'); result.classList.remove('hidden');
 if(voted===impName){ names.forEach(n=>{if(n!==impName) scores[n]++;}); }
 else scores[impName]+=2;
 res.innerHTML=`Impostor: <b>${impName}</b><br>Hasło: <b>${word}</b><br>Wybrano: <b>${voted}</b>`;
 let h='<h3>🏆 Wyniki</h3><table><tr><th>Gracz</th><th>Pkt</th></tr>';
 Object.keys(scores).forEach(n=> h+=`<tr><td>${n}</td><td>${scores[n]}</td></tr>`);
 score.innerHTML=h+'</table>';
}

function nextRound(){
 result.classList.add('hidden');
 setup.classList.remove('hidden');
}
</script></body></html>
