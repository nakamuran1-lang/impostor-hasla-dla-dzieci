<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostor Kids 2.0</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:auto;padding:15px;text-align:center}
input,select,button{font-size:20px;padding:10px;margin:5px}
.hidden{display:none}
.card{border:1px solid #ddd;border-radius:12px;padding:15px;margin-top:10px}
#timer{font-size:56px;font-weight:bold}
</style>
</head>
<body>

<div id="setup">
<h1>🎭 Impostor Kids</h1>

<label>Liczba graczy:</label>
<select id="playerCount" onchange="generateNames()">
<option>3</option><option>4</option><option>5</option>
<option>6</option><option>7</option><option>8</option><option>9</option>
</select>

<div id="names"></div>

<label>Kategoria:</label>
<select id="category">
<option>Zwierzęta</option>
<option>Jedzenie</option>
<option>Pojazdy</option>
<option>Sport</option>
<option>Bajki</option>
<option>Zabawki</option>
</select><br>

<button onclick="startGame()">START</button>
</div>

<div id="pass" class="hidden card">
<h2 id="passText"></h2>
<button onclick="showRole()">Pokaż rolę</button>
</div>

<div id="roleBox" class="hidden card">
<h2 id="roleText"></h2>
<button onclick="nextPlayer()">Ukryj i przekaż dalej</button>
</div>

<div id="round" class="hidden card">
<h2 id="catInfo"></h2>
<div id="timer">03:00</div>
<button onclick="finishRound()">🗳️ Koniec i głosowanie</button>
</div>

<div id="vote" class="hidden card">
<h2>Głosowanie</h2>
<div id="voteButtons"></div>
</div>

<div id="result" class="hidden card">
<h1>🎉 Wynik</h1>
<h2 id="winner"></h2>
<p id="secret"></p>
<button onclick="location.reload()">Nowa gra</button>
</div>

<script>
const categories={
"Zwierzęta":["pies","kot","lew","tygrys","słoń","żyrafa","zebra","królik"],
"Jedzenie":["pizza","lody","hamburger","makaron","naleśnik","frytki"],
"Pojazdy":["samochód","rower","autobus","pociąg","samolot","rakieta"],
"Sport":["piłka","basen","tenis","rower","bieganie","bramka"],
"Bajki":["smok","król","pirat","jednorożec","robot","rycerz"],
"Zabawki":["klocki","lalka","pluszak","balon","hulajnoga","rolki"]
};

let names=[],roles=[],current=0,secretWord="",impostorName="";
let timerInterval;

function beep(freq=700,dur=150){
 const a=new(window.AudioContext||window.webkitAudioContext)();
 const o=a.createOscillator();
 const g=a.createGain();
 o.connect(g); g.connect(a.destination);
 o.frequency.value=freq;
 o.start();
 g.gain.setValueAtTime(0.1,a.currentTime);
 o.stop(a.currentTime+dur/1000);
}

function generateNames(){
 const n=parseInt(document.getElementById("playerCount").value);
 let html="";
 for(let i=0;i<n;i++){
 html+=`<input id="n${i}" placeholder="Imię gracza ${i+1}"><br>`;
 }
 document.getElementById("names").innerHTML=html;
}
generateNames();

function startGame(){
 const n=parseInt(document.getElementById("playerCount").value);

 names=[];
 for(let i=0;i<n;i++){
 names.push(document.getElementById("n"+i).value || ("Gracz "+(i+1)));
 }

 const cat=document.getElementById("category").value;
 const list=categories[cat];
 secretWord=list[Math.floor(Math.random()*list.length)];

 const imp=Math.floor(Math.random()*n);
 impostorName=names[imp];

 roles=[];
 for(let i=0;i<n;i++){
 roles.push(i===imp?"IMPOSTOR":secretWord);
 }

 document.getElementById("setup").classList.add("hidden");
 document.getElementById("pass").classList.remove("hidden");
 document.getElementById("passText").innerText="📱 Przekaż telefon: "+names[0];
 beep();
}

function showRole(){
 document.getElementById("roleBox").classList.remove("hidden");

 const cat=document.getElementById("category").value;

 if(roles[current]==="IMPOSTOR"){
  document.getElementById("roleText").innerHTML="🕵️ Tajna misja!<br>Kategoria: "+cat;
 }else{
  document.getElementById("roleText").innerHTML="📚 Kategoria: "+cat+"<br><br>Hasło: "+roles[current];
 }

 beep(900);
}

function nextPlayer(){
 beep(500);
 document.getElementById("roleBox").classList.add("hidden");
 current++;

 if(current>=names.length){
  document.getElementById("pass").classList.add("hidden");
  startRound();
 }else{
  document.getElementById("passText").innerText="📱 Przekaż telefon: "+names[current];
 }
}

function startRound(){
 document.getElementById("round").classList.remove("hidden");
 document.getElementById("catInfo").innerText="📚 Kategoria: "+document.getElementById("category").value;

 let t=180;

 timerInterval=setInterval(()=>{
 t--;
 let m=String(Math.floor(t/60)).padStart(2,"0");
 let s=String(t%60).padStart(2,"0");
 document.getElementById("timer").innerText=m+":"+s;

 if(t<=0){
  beep(250,500);
  finishRound();
 }
 },1000);
}

function finishRound(){
 clearInterval(timerInterval);
 document.getElementById("round").classList.add("hidden");
 document.getElementById("vote").classList.remove("hidden");

 let html="";
 names.forEach(n=>{
 html+=`<button onclick="showResult('${n}')">${n}</button><br>`;
 });
 document.getElementById("voteButtons").innerHTML=html;
}

function showResult(voted){
 document.getElementById("vote").classList.add("hidden");
 document.getElementById("result").classList.remove("hidden");

 document.getElementById("winner").innerHTML="Impostorem był: <b>"+impostorName+"</b>";
 document.getElementById("secret").innerHTML="Hasło: <b>"+secretWord+"</b><br><br>Wybraliście: <b>"+voted+"</b>";
 beep(1200,400);
}
</script>

</body>
</html>
